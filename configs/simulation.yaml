# Paper 1 (DEBS) — self-aggregation exploration simulation
# Layer 2/3 settings are intentionally absent in this iteration.

# ---------------------------------------------------------------------------
# Dynamic Environment Extension (SDS §27)
# Set enabled: true to activate moving obstacles.
# When enabled: false the simulator is identical to the original repository.
# ---------------------------------------------------------------------------
dynamic_environment:
  enabled: false

  # Scenario tag used for experiment labelling (SDS §35).
  # Values: static | slow | equal_speed | fast | mixed
  scenario: mixed

  # Number of dynamic obstacles to spawn.
  obstacle_count: 12

  # Collision detection thresholds [m] (SDS §33).
  collision_radius: 0.35
  safety_margin: 0.75

  # RNG seed for reproducible dynamic obstacle placement and motion.
  random_seed: 42

  # --- Per-model motion parameters ---

  linear:
    # Constant speed [m/s].  UAV max speed = 1.5 m/s.
    speed: 0.5

  waypoint:
    speed: 1.0

  random_walk:
    speed: 0.8
    turn_noise: 0.15

environment:
  width: 100.0
  height: 100.0
  obstacle_count: 20
  obstacle_min_radius: 1.5
  obstacle_max_radius: 4.0
  obstacle_seed: 42

uav:
  # Paper 1 dynamics (Sec. 2.3, experiments)
  max_speed: 1.5
  max_angular_velocity: 0.9
  sensing_range: 4.5
  initial_spread_radius: 20.0
  spawn_mode: ring
  spawn_angular_noise: 0.15

aggregation:
  # Paper 1 Eq. (7) utility U_a distance thresholds
  d_c: 0.5
  d_0: 12.0
  k_a: 1.0
  turn_cost_weight: 1.0
  # Eq. (10) trail penalty — raised after geographic trail fix (see docs/assumptions.md)
  trail_penalty: 8.0
  # Composite viewpoint cost weights (Sec. 5 — BSA + navigation + penalty)
  cluster_penalty_weight: 1.0
  turn_penalty_weight: 0.5
  trail_penalty_weight: 1.0
  candidates_per_frontier: 6
  # Mission region radius ≈ max detection range (Paper 1 task allocation model)
  mission_region_radius: 4.5
  replan_interval: 2.0

simulation:
  num_uavs: 10
  dt: 0.1
  duration: 120.0
  spawn_center_x: 50.0
  spawn_center_y: 50.0
  animation_interval_ms: 50
