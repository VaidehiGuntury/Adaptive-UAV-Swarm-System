# Baseline experiment — pre-correction spawn and trail penalty (behavioral comparison)

environment:
  width: 100.0
  height: 100.0
  obstacle_count: 20
  obstacle_min_radius: 1.5
  obstacle_max_radius: 4.0
  obstacle_seed: 42

uav:
  max_speed: 1.5
  max_angular_velocity: 0.9
  sensing_range: 4.5
  initial_spread_radius: 3.0
  spawn_mode: legacy
  spawn_angular_noise: 0.15

aggregation:
  d_c: 0.5
  d_0: 12.0
  k_a: 1.0
  turn_cost_weight: 1.0
  trail_penalty: 2.0
  cluster_penalty_weight: 1.0
  turn_penalty_weight: 0.5
  trail_penalty_weight: 1.0
  candidates_per_frontier: 6
  mission_region_radius: 4.5
  replan_interval: 2.0

simulation:
  num_uavs: 10
  dt: 0.1
  duration: 120.0
  spawn_center_x: 50.0
  spawn_center_y: 50.0
  animation_interval_ms: 50
